# Alembic configuration for Deeply Analytics.
#
# Run from project root:
#   alembic upgrade head           # apply migrations
#   alembic revision -m "..."      # write a new migration by hand
#   alembic revision --autogenerate -m "..."  # diff models vs DB (needs live DB)
#   alembic current                # show current revision
#   alembic history --verbose

[alembic]
script_location = backend/alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# sqlalchemy.url is intentionally blank; backend/alembic/env.py loads it from
# Settings.database_url so there is one source of truth.
sqlalchemy.url =

[post_write_hooks]
# Disabled. Add a black or ruff hook here if desired.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
